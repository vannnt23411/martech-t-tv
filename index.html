<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Market Insight Input</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
      text-align: center;
    }

    label {
      font-weight: 600;
      margin-top: 10px;
      display: block;
      color: #555;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      height: 80px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #4CAF50;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>📊 Nhập dữ liệu thị trường</h2>

    <form id="marketForm">
      
      <label>URL</label>
      <input type="text" id="url" placeholder="https://..." required />

      <label>Nội dung</label>
      <textarea id="content_text" placeholder="Nhập nội dung..." required></textarea>

      <div class="row">
        <div>
          <label>Likes</label>
          <input type="number" id="likes" value="0" />
        </div>

        <div>
          <label>Comments</label>
          <input type="number" id="comments" value="0" />
        </div>

        <div>
          <label>Shares</label>
          <input type="number" id="shares" value="0" />
        </div>
      </div>

      <button type="submit">🚀 Submit</button>
    </form>
  </div>

  <script>
    document.getElementById("marketForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = {
        url: document.getElementById("url").value,
        content_text: document.getElementById("content_text").value,
        engagement_metrics: {
          likes: Number(document.getElementById("likes").value),
          comments: Number(document.getElementById("comments").value),
          shares: Number(document.getElementById("shares").value)
        }
      };

      try {
        await fetch("https://thaovan170605.app.n8n.cloud/webhook/market-insight", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        alert("✅ Gửi thành công!");
      } catch (err) {
        alert("❌ Lỗi gửi dữ liệu");
      }
    });
  </script>

</body>
</html>
